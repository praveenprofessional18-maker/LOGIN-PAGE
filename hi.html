<!DOCTYPE html>

<html>
<head>
<title>Game Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  overflow: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 110%;
  height: 110%;
  background: url('https://i.pinimg.com/1200x/0d/ad/a1/0dada1304d2febe68713b744d347d6de.jpg') no-repeat center center;
  background-size: cover;
  animation: moveBg 20s infinite alternate ease-in-out;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: scale(1) translate(0, 0); }
  100% { transform: scale(1.1) translate(-20px, -20px); }
}

/* BOX */
.container {
  width: 800px;
  height: 420px;
  display: flex;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* LEFT */
.left {
  width: 50%;
  background: url('https://images.unsplash.com/photo-1713630019375-f483a9729a8b') no-repeat center;
  background-size: cover;
  color: white;
  padding: 30px;
  position: relative;
}

.left::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.left-content {
  position: relative;
  z-index: 1;
}

/* RIGHT */
.right {
  width: 50%;
  background: linear-gradient(to bottom right, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FORM */
.box {
  text-align: center;
  color: white;
  width: 250px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 100%;
  border-radius: 20px;
  border: none;
}

button.main-btn {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border-radius: 20px;
  border: none;
  background: white;
  color: #333;
  cursor: pointer;
}

button.main-btn:hover {
  background: #ddd;
}

.switch {
  margin-top: 10px;
  font-size: 13px;
  cursor: pointer;
}

/* EMOJI STYLE */
.emoji {
  position: fixed;
  font-size: 26px;
  animation: explode 1.5s ease-out forwards;
  pointer-events: none;
}

/* EXPLOSION ANIMATION */
@keyframes explode {
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(var(--x), var(--y)) scale(1.8);
    opacity: 0;
  }
}
</style>

</head>

<body>

<div class="container">

  <div class="left">
    <div class="left-content">
      <h1>3DM GAME</h1>
      <p>You want most games in here</p>
    </div>
  </div>

  <div class="right">
    <div class="box">

</div>

<script>
function showSignup(){
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("signupForm").style.display = "block";
}

function showLogin(){
  document.getElementById("signupForm").style.display = "none";
  document.getElementById("loginForm").style.display = "block";
}

/* PINTEREST STYLE EMOJI BURST */
function createEmoji() {
  const emojis = ["🎮","🔥","💥","🚀","🎯","✨","💎","🕹️"];

  for(let i = 0; i < 25; i++){
    let emoji = document.createElement("div");
    emoji.className = "emoji";
    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    emoji.style.left = "50%";
    emoji.style.top = "60%";

    let x = (Math.random() - 0.5) * 600;
    let y = (Math.random() - 0.5) * 600;

    emoji.style.setProperty('--x', x + 'px');
    emoji.style.setProperty('--y', y + 'px');

    document.body.appendChild(emoji);

    setTimeout(() => {
      emoji.remove();
    }, 1500);
  }
}

/* LOGIN */
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(email && password){
    createEmoji();

    setTimeout(() => {
      window.location.href = "https://poki.com/";
    }, 1500);
  } else {
    alert("Enter Email & Password");
  }
}
</script>

</body>
</html>
